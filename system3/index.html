<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>${title}</title>
    <meta name="description" content="${description}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="ifiction:ifid" content="${ifid}" prefix="ifiction: http://babel.ifarchive.org/protocol/iFiction/" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="interface.css" />
    <script>
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
    </script>
  </head>

  <body>
    <script src="./interpreter.ts"></script>

    <!-- story file placeholder -->
    <script>
      function loadStory() {
        fetch("./system3.sample.json")
          .then(r => r.json())
          .then(story => {
            interpret(story, document.getElementById("published"));
          });
      }

      window.addEventListener("layoutReady", loadStory);
    </script>

    <script src="./layout.ts"></script>

    <!-- find local ip, hopefully, and QR code it -->
    <script src="./findLocalIP.ts"></script>
  </body>
</html>

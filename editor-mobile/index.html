<html>
  <head>
    <title>Mirrorway - Speech to Text</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      .pulse {
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      #qr > div:nth-child(2) {
        font-size: x-small;
      }
      actions-row {
        display: flex;
        justify-content: space-around;
      }
      button {
        font-size: x-large;
        padding: 2em;
      }
    </style>
  </head>
  <body>
    <div id="qr"></div>
    <actions-row>
      <button id="startButton">Listen.</button>
      <button id="shareButton">Share...</button>
      <button id="copyButton">Copy to clipboard...</button>
    </actions-row>
    <main id="output"></main>
    <script src="./index.ts" type="module"></script>
  </body>
</html>
